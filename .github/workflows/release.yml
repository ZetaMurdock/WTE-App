name: Release

# Build signed installers + auto-update manifest whenever you push a version tag (e.g. v0.1.0).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Fast gate: typecheck + unit tests must pass before any installer builds start.
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci || npm install

      - name: Build + publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "W.T.E ${{ github.ref_name }}"
          releaseBody: "Automated build. The auto-updater reads latest.json from this release."
          releaseDraft: false
          prerelease: false
          # tauri-action publishes the platform installers + latest.json (the updater manifest)
          updaterJsonPreferNsis: true
