# W.T.E TURN (coturn) — self-hosted WebRTC relay fallback. See ../README.md.
# Replace example.com and the IP/secret/cert paths for your VPS.

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Your VPS public IP (both lines the same on a normal cloud VPS).
relay-ip=YOUR_VPS_PUBLIC_IP
external-ip=YOUR_VPS_PUBLIC_IP

realm=turn.example.com
server-name=turn.example.com

# Time-limited credentials the app mints from the shared secret (coturn REST auth).
use-auth-secret
static-auth-secret=REPLACE_WITH_A_LONG_RANDOM_SECRET
lt-cred-mech

# TLS for turns:5349 — reuse the cert for turn.example.com (certbot or Caddy).
cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Relay port range — must match the UDP range opened in the firewall.
min-port=49152
max-port=65535

fingerprint
no-cli
no-tcp-relay
no-multicast-peers

# Refuse to relay to private/loopback ranges (prevents the relay being abused as a proxy
# into internal networks).
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
