<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W.T.E</title>
<style>
  :root{ --bg:#2a2722; --bar:#1c1b19; --bone:#cfc8ba; --accent:#8a6d3b; --ink:#e7e2d8; }
  body.wte-light{ --bg:#dcd8ce; --bar:#e2ded6; --bone:#5a5346; --accent:#8a6d3b; --ink:#1f1e1c; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);font-family:Georgia,'Times New Roman',serif;color:var(--ink);overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100vh;}
  .tabbar{display:flex;align-items:center;gap:2px;background:var(--bar);border-bottom:1px solid #000;padding:0 6px;height:34px;flex:0 0 auto;-webkit-user-select:none;user-select:none;}
  .brand{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--bone);margin-right:12px;padding-left:4px;}
  .tab{appearance:none;border:none;background:none;color:#9a958c;font-family:Georgia,serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;cursor:pointer;border-bottom:2px solid transparent;}
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);}
  .spacer{flex:1;}
  .ver{font-size:9px;color:#6b6760;letter-spacing:1px;}
  .upd{display:none;align-items:center;gap:6px;font-size:10px;color:#d8b25a;margin-right:8px;}
  .upd.show{display:flex;}
  .upd button{background:var(--accent);border:none;color:#fff;font-family:Georgia,serif;font-size:10px;padding:3px 9px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
  .views{flex:1;position:relative;}
  .views iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg);}
  .views iframe.hidden{visibility:hidden;pointer-events:none;}
</style>
</head>
<body>
<div class="app">
  <div class="tabbar">
    <span class="brand">W.T.E</span>
    <button class="tab active" id="tab-sheet" onclick="wteTab('sheet')">Character Sheet</button>
    <button class="tab" id="tab-vtt" onclick="wteTab('vtt')">VTT</button>
    <span class="spacer"></span>
    <span class="upd" id="upd"><span id="upd-msg">Update available</span><button onclick="wteInstallUpdate()" id="upd-btn">Restart &amp; update</button></span>
    <button class="tab" id="acct-btn" onclick="wteAccount()" title="Google account">Sign in</button>
    <button class="tab" id="theme-btn" onclick="wteToggleTheme()" title="Switch Light / Dark theme">Theme</button>
    <span class="ver" id="ver"></span>
  </div>
  <div class="views">
    <iframe id="view-sheet" src="sheet.html"></iframe>
    <iframe id="view-vtt" src="vtt.html" class="hidden"></iframe>
  </div>
</div>
<script>
  // ── THEME (Stylus Update) — shared 'wte-theme' key; storage events flip the iframes too ──
  function wteApplyTheme(t){ document.body.classList.toggle('wte-light', t==='light'); var b=document.getElementById('theme-btn'); if(b)b.textContent=(t==='light'?'Dark':'Light'); }
  window.wteToggleTheme = function(){ var t=document.body.classList.contains('wte-light')?'dark':'light'; try{localStorage.setItem('wte-theme',t);}catch(e){} wteApplyTheme(t);
    // nudge the iframes immediately (they also listen for the storage event)
    ['view-sheet','view-vtt'].forEach(function(id){ var f=document.getElementById(id); try{ f&&f.contentWindow&&f.contentWindow.wteApplyTheme&&f.contentWindow.wteApplyTheme(t); }catch(e){} }); };
  wteApplyTheme((function(){try{return localStorage.getItem('wte-theme');}catch(e){return null;}})()||'dark');
  window.addEventListener('storage',function(e){ if(e.key==='wte-theme')wteApplyTheme(e.newValue||'dark'); });

  // Tab switching — both views stay loaded so neither reloads / "opens a new VTT each time".
  var views = { sheet: document.getElementById('view-sheet'), vtt: document.getElementById('view-vtt') };
  window.wteTab = function(name){
    Object.keys(views).forEach(function(k){ views[k].classList.toggle('hidden', k!==name); });
    document.getElementById('tab-sheet').classList.toggle('active', name==='sheet');
    document.getElementById('tab-vtt').classList.toggle('active', name==='vtt');
    var win = views[name] && views[name].contentWindow;
    if(win){ try{ win.focus(); }catch(e){} }
  };

  // ── Tauri integration (uses withGlobalTauri globals; no bundler needed) ──
  // Outside the desktop app (plain browser), window.__TAURI__ is undefined → everything below no-ops.
  async function initTauri(){
    var T = window.__TAURI__; if(!T) return;
    try{ if(T.app && T.app.getVersion) document.getElementById('ver').textContent = 'v' + await T.app.getVersion(); }catch(e){}
    try{
      if(T.updater && T.updater.check){
        var update = await T.updater.check();
        if(update && update.available){
          window.__wteUpdate = update;
          document.getElementById('upd-msg').textContent = 'Update ' + (update.version||'') + ' available';
          document.getElementById('upd').classList.add('show');
        }
      }
    }catch(e){ /* offline or updater endpoint not configured yet */ }
  }
  window.wteInstallUpdate = async function(){
    var T = window.__TAURI__, update = window.__wteUpdate; if(!T || !update) return;
    var btn = document.getElementById('upd-btn'); btn.textContent='Downloading…'; btn.disabled=true;
    try{
      await update.downloadAndInstall();
      if(T.process && T.process.relaunch) await T.process.relaunch();
    }catch(e){ btn.textContent='Update failed'; btn.disabled=false; }
  };
  initTauri();

  // ════════════════════════════════════════ GOOGLE ACCOUNT (beta) ════════════════════════════════════════
  var DEFAULT_OAUTH_CLIENT_ID = "147593598636-a8gn087e5oj75ikglcpvkl65u687gkal.apps.googleusercontent.com";
  function getCfg(){ try{ return JSON.parse(localStorage.getItem('wte-fb-config')||'null'); }catch(e){ return null; } }
  function getOAuth(){ var o; try{ o=JSON.parse(localStorage.getItem('wte-oauth')||'null'); }catch(e){} o=o||{}; if(!o.clientId)o.clientId=DEFAULT_OAUTH_CLIENT_ID; return o; }
  function b64url(bytes){ var s=''; for(var i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
  var _fbReady=null;
  function ensureFirebase(cfg){
    if(_fbReady)return _fbReady;
    _fbReady=new Promise(function(res,rej){
      function load(src,cb){ var s=document.createElement('script'); s.src=src; s.onload=cb; s.onerror=function(){rej(new Error('load fail'));}; document.head.appendChild(s); }
      load('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',function(){
        load('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',function(){
          try{ if(!firebase.apps.length)firebase.initializeApp(cfg); res(); }catch(e){ rej(e); }
        });
      });
    });
    return _fbReady;
  }
  function renderAcct(u){
    var b=document.getElementById('acct-btn'); if(!b)return;
    if(u){ b.textContent=(u.displayName||u.email||'Account').split(' ')[0]; b.title='Signed in as '+(u.email||'')+' — click to sign out'; }
    else { b.textContent='Sign in'; b.title='Sign in with Google'; }
  }
  window.wteAccount = async function(){
    var T=window.__TAURI__;
    if(!T){ alert('Google sign-in works in the desktop app.'); return; }
    var cfg=getCfg();
    if(!cfg||!cfg.authDomain||!cfg.projectId){ alert('First set your full Firebase config (with authDomain + projectId) in the VTT/Sheet table settings, then try again.'); return; }
    try{ await ensureFirebase(cfg); }catch(e){ alert('Could not load Firebase Auth.'); return; }
    // already signed in → offer sign out
    if(firebase.auth().currentUser){ if(confirm('Sign out of '+(firebase.auth().currentUser.email||'this account')+'?')){ await firebase.auth().signOut(); renderAcct(null); } return; }
    var oauth=getOAuth();
    if(!oauth.clientSecret){
      var sec=prompt('Paste your Google OAuth *client secret* (from the Desktop OAuth client — installed-app secret, stored only on this device):','');
      if(!sec)return; oauth.clientSecret=sec.trim(); try{ localStorage.setItem('wte-oauth',JSON.stringify(oauth)); }catch(e){}
    }
    var b=document.getElementById('acct-btn'); b.textContent='Signing in…';
    try{
      var verifier=b64url(crypto.getRandomValues(new Uint8Array(48)));
      var challenge=b64url(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))));
      var idToken=await T.core.invoke('google_signin',{ clientId:oauth.clientId, clientSecret:oauth.clientSecret, codeChallenge:challenge, codeVerifier:verifier });
      var cred=firebase.auth.GoogleAuthProvider.credential(idToken);
      var res=await firebase.auth().signInWithCredential(cred);
      renderAcct(res.user);
    }catch(e){ renderAcct(firebase.auth().currentUser); alert('Sign-in failed: '+(e&&e.message?e.message:e)); }
  };
  // restore session on launch (Firebase persists auth per-origin; iframes share it)
  (async function(){
    if(!window.__TAURI__)return; var cfg=getCfg(); if(!cfg||!cfg.authDomain)return;
    try{ await ensureFirebase(cfg); firebase.auth().onAuthStateChanged(function(u){ renderAcct(u); }); }catch(e){}
  })();
</script>
</body>
</html>
